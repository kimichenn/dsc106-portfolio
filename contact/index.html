        <h1>Contact</h1>
        <form
            action="mailto:hello@kimichen.net"
            method="POST"
            enctype="text/plain"
        >
            <label>
                Name:
                <input type="text" name="name" />
            </label>
            <label>
                Email:
                <input type="email" name="email" />
            </label>
            <label>
                Message:
                <textarea name="message"></textarea>
            </label>
            <button type="submit">Send</button>
        </form>
